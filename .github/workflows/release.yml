name: Create Release

on:
  workflow_dispatch:

permissions:
  contents: write        # Required for creating releases and uploading assets
  actions: read          # Required by SignPath action to read job details
  id-token: write        # Optional: For OIDC authentication (future enhancement)
  attestations: write    # Optional: For build provenance attestations (future enhancement)

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract Version
        run: |
          $content = Get-Content "CHANGELOG.md" -Raw
          if ($content -match "#### Version\s+([\d.]+)") {
            $version = $matches[1]
            Write-Host "Version: $version"
            echo "VERSION=$version" >> $env:GITHUB_ENV
          } else {
            Write-Error "Could not find version in CHANGELOG.md"
            exit 1
          }

      - name: Extract Release Notes
        run: |
          $content = Get-Content "CHANGELOG.md" -Raw
          $version = "${{ env.VERSION }}"

          # Match the version section in CHANGELOG.md
          $pattern = "#### Version\s+\-\s+" + [regex]::Escape($version) + "\s+\-[^\n]*\n((?:(?!#### Version)[\s\S])*)"

          if ($content -match $pattern) {
            $notes = $matches[1].Trim()

            # Remove comparison images section if present
            $notes = $notes -replace "(?s)##### Comparison images.*$", ""
            $notes = $notes.Trim()

            Write-Host "Extracted release notes:"
            Write-Host $notes

            # Write to multiline environment variable
            "RELEASE_NOTES<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $notes | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "EOF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Error "Could not find changelog for version $version"
            exit 1
          }

      - name: Clean
        run: dotnet clean

      - name: Publish WPF App
        run: |
          dotnet publish Wabbajack.App.Wpf\Wabbajack.App.Wpf.csproj `
            --framework "net9.0-windows" `
            --runtime win-x64 `
            --configuration Release `
            /p:Platform=x64 `
            -o publish\app `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            --self-contained `
            /p:DebugType=embedded

      - name: Publish Launcher
        run: |
          dotnet publish Wabbajack.Launcher\Wabbajack.Launcher.csproj `
            --framework "net9.0-windows" `
            --runtime win-x64 `
            --configuration Release `
            /p:Platform=x64 `
            -o publish\launcher `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            --self-contained `
            /p:DebugType=embedded

      - name: Publish CLI
        run: |
          dotnet publish Wabbajack.CLI\Wabbajack.CLI.csproj `
            --framework "net9.0" `
            --runtime win-x64 `
            --configuration Release `
            /p:Platform=x64 `
            -o publish\app\cli `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            --self-contained `
            /p:DebugType=embedded

      # Sign the executables using SignPath GitHub Action
      # Main App Signing: Upload → Sign
      - name: Upload Unsigned Main App for Signing
        id: upload-main-app
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-main-app
          path: publish\app\Wabbajack.exe
          retention-days: 1

      - name: Sign Main App with SignPath
        id: sign-main-app
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_KEY }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: wabbajack
          signing-policy-slug: test-signing
          artifact-configuration-slug: wabbajack-app
          github-artifact-id: ${{ steps.upload-main-app.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: publish\app

      # CLI Signing: Upload → Sign
      - name: Upload Unsigned CLI for Signing
        id: upload-cli
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-cli
          path: publish\app\cli\wabbajack-cli.exe
          retention-days: 1

      - name: Sign CLI with SignPath
        id: sign-cli
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_KEY }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: wabbajack
          signing-policy-slug: test-signing
          artifact-configuration-slug: wabbajack-cli
          github-artifact-id: ${{ steps.upload-cli.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: publish\app\cli

      # Launcher Signing: Upload → Sign
      - name: Upload Unsigned Launcher for Signing
        id: upload-launcher
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-launcher
          path: publish\launcher\Wabbajack.exe
          retention-days: 1

      - name: Sign Launcher with SignPath
        id: sign-launcher
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_KEY }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: wabbajack
          signing-policy-slug: test-signing
          artifact-configuration-slug: wabbajack-launcher
          github-artifact-id: ${{ steps.upload-launcher.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: publish\launcher

      - name: Create App ZIP
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a publish\${{ env.VERSION }}.zip publish\app\*

      - name: Create Launcher ZIP
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a publish\wabbajack-launcher-${{ env.VERSION }}.zip publish\launcher\*

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wabbajack-app
          path: publish\${{ env.VERSION }}.zip
          retention-days: 30

      - name: Upload Launcher Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wabbajack-launcher
          path: publish\wabbajack-launcher-${{ env.VERSION }}.zip
          retention-days: 30

      - name: Create GitHub Release
        id: create_release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "Creating release for version ${{ env.VERSION }}"

          # Check if release already exists (for re-runs)
          $releaseExists = gh release view "${{ env.VERSION }}" 2>$null

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release ${{ env.VERSION }} already exists, skipping creation"
          } else {
            Write-Host "Creating new release ${{ env.VERSION }}"
            gh release create "${{ env.VERSION }}" `
              --title "${{ env.VERSION }}" `
              --notes "${{ env.RELEASE_NOTES }}" `
              --draft `
              --latest

            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to create release"
              exit 1
            }
          }

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "Uploading assets for version ${{ env.VERSION }}"

          # Get list of existing assets (for re-runs)
          $existingAssets = @()
          try {
            $assetsJson = gh release view "${{ env.VERSION }}" --json assets | ConvertFrom-Json
            $existingAssets = $assetsJson.assets | ForEach-Object { $_.name }
            Write-Host "Existing assets: $($existingAssets -join ', ')"
          } catch {
            Write-Host "No existing assets found"
          }

          # Upload Wabbajack.exe (launcher)
          if ($existingAssets -notcontains "Wabbajack.exe") {
            Write-Host "Uploading Wabbajack.exe"
            gh release upload "${{ env.VERSION }}" "publish\launcher\Wabbajack.exe" --clobber
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to upload Wabbajack.exe"
              exit 1
            }
          } else {
            Write-Host "Wabbajack.exe already exists, skipping"
          }

          # Upload app package ZIP
          $zipName = "${{ env.VERSION }}.zip"
          if ($existingAssets -notcontains $zipName) {
            Write-Host "Uploading $zipName"
            gh release upload "${{ env.VERSION }}" "publish\$zipName" --clobber
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to upload $zipName"
              exit 1
            }
          } else {
            Write-Host "$zipName already exists, skipping"
          }

          Write-Host "Asset upload complete"
